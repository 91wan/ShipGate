name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install development tools
        run: python -m pip install -e '.[dev]'
      - name: Run complete local validation
        run: make validate PYTHON=python
      - name: Check Git publication surface
        run: |
          python scripts/shipgate.py check . \
            --operation public-push \
            --project-type codex-skill \
            --report-md build/shipgate/public-push.md \
            --report-json build/shipgate/public-push.json
      - name: Assert report privacy
        run: |
          ! grep -R --fixed-strings "$HOME" build/shipgate
          ! grep -R --fixed-strings "$(pwd -P)" build/shipgate
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shipgate-validation-python-${{ matrix.python }}
          path: |
            build/coverage.json
            build/shipgate/*.json
            build/shipgate/*.md
          if-no-files-found: warn
          retention-days: 7
